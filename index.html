<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#171310" />
    <meta name="description" content="ELOmax — entrenador de ajedrez basado en evidencia. Local-first: tus datos viven en tu dispositivo." />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <title>ELOmax</title>
    <!-- Aplica el tema antes de pintar para no parpadear (la preferencia vive
         en localStorage, ver src/ui/theme.ts). Modo oscuro primero. -->
    <script>
      (function () {
        try {
          var pref = localStorage.getItem('elomax-theme');
          var resolved =
            pref === 'light' || pref === 'dark'
              ? pref
              : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
                ? 'dark'
                : 'light';
          document.documentElement.dataset.theme = resolved;
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', resolved === 'dark' ? '#171310' : '#efe6d6');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
